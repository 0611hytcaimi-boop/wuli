<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body>
<script>
const TestObj = { name: 'hello', value: 42 };
var TestVarObj = { name: 'varHello', value: 99 };
</script>
<script>
// 测试 const 是否能被后续脚本访问
document.write('typeof TestObj: ' + typeof TestObj + '<br>');
document.write('TestObj.name: ' + (TestObj ? TestObj.name : 'NOT_FOUND') + '<br>');
document.write('typeof TestVarObj: ' + typeof TestVarObj + '<br>');
document.write('TestVarObj.name: ' + (TestVarObj ? TestVarObj.name : 'NOT_FOUND') + '<br>');
document.write('window.TestObj: ' + (window.TestObj ? window.TestObj.name : 'UNDEFINED') + '<br>');
document.write('window.TestVarObj: ' + (window.TestVarObj ? window.TestVarObj.name : 'UNDEFINED') + '<br>');
</script>
</body>
</html>
